name: repro-openssl

# TEMPLATE (from the `dotfiles-test-linux` skill). Copy to `.github/workflows/repro-openssl.yml`
# and copy `bundle-race.sh` to `.github/repro/bundle-race.sh` to reproduce the test-linux
# openssl@3 / Linuxbrew source-build failures on a REAL amd64 runner (the local arm64 dev env
# cannot faithfully reproduce the source build). Installs only openssl@3 + a 2–3 formula
# Brewfile, so it finishes in ~8–16 min instead of the multi-hour full install.
#
# Trigger: push to the `test-workflow` branch (the real test-linux only runs on push to main).
# Pick the reproduction/fix candidate via the `mode` matrix (see bundle-race.sh):
#   race | diag | sslenv (validated fix) | clean | hardened
# DELETE this workflow and .github/repro/ once debugging is done — the fix itself lives only
# in init/homebrew/main.sh.
on:
  push:
    branches: [test-workflow]
  workflow_dispatch:

jobs:
  bundle-race:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        mode: [sslenv]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Build docker image
        run: docker build . -f dockerfile/ubuntu.dockerfile -t dotfiles:ubuntu
      - name: Bundle race test (MODE=${{ matrix.mode }})
        run: >-
          docker run -i -u user -e MODE=${{ matrix.mode }}
          --mount type=bind,source=${{ github.workspace }},target=/home/user/dotfiles,readonly
          dotfiles:ubuntu
          bash /home/user/dotfiles/.github/repro/bundle-race.sh
